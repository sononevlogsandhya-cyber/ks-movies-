<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KS Movies — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{
  --accent:#e50914;--gold:#FFD700;--green:#00c853;
  --text:#fff;--muted:#999;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;font-family:'DM Sans',sans-serif;
  color:var(--text);overflow:hidden;user-select:none;-webkit-user-select:none;}

/* ── SPLASH ── */
#ks-splash{position:fixed;inset:0;z-index:99999;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity .6s ease;}
#ks-splash.hide{opacity:0;pointer-events:none;}
.spl-logo{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:4px;
  animation:pop .7s var(--spring) .2s both;}
.spl-logo span{color:var(--accent);}
.spl-tag{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.28);margin-top:8px;animation:pop .6s var(--spring) .4s both;}
.spl-bar-wrap{width:140px;height:2px;background:rgba(255,255,255,.07);
  border-radius:2px;margin-top:28px;overflow:hidden;animation:pop .5s var(--spring) .6s both;}
.spl-bar-fill{height:100%;background:var(--accent);width:0%;transition:width .05s linear;}
.spl-status{font-size:.64rem;letter-spacing:2px;text-transform:uppercase;
  color:#2a2a2a;margin-top:14px;animation:pop .5s var(--spring) .7s both;}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.93)}to{opacity:1;transform:none}}

/* ── SHELL ── */
#player-shell{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden;}
#video-area{position:absolute;inset:0;background:#000;}
#main-video{width:100%;height:100%;object-fit:contain;display:block;}

/* ── SPINNER ── */
#spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:52px;height:52px;z-index:20;display:none;}
#spinner.active{display:block;}
.spin-ring{width:100%;height:100%;border-radius:50%;
  border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);
  animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── INTRO OVERLAY ── */
#intro-overlay{position:absolute;inset:0;z-index:65;background:#000;display:flex;
  align-items:flex-end;justify-content:flex-end;}
#intro-overlay.hidden{display:none;}
#intro-video{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;}
.intro-badge{position:relative;z-index:2;margin:18px;
  background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.14);
  border-radius:8px;padding:7px 16px;
  font-size:.78rem;font-weight:700;color:rgba(255,255,255,.55);
  display:flex;align-items:center;gap:8px;}
.intro-badge span{color:var(--accent);font-variant-numeric:tabular-nums;}

/* ── AD OVERLAY ── */
#ad-overlay{position:absolute;inset:0;z-index:60;background:#000;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .35s ease;}
#ad-overlay.visible{opacity:1;pointer-events:all;}

.ad-topbar{display:flex;align-items:center;gap:10px;
  padding:9px 14px;background:rgba(0,0,0,.94);
  border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.ad-tag{background:var(--gold);color:#000;font-size:.66rem;font-weight:900;
  padding:3px 10px;border-radius:4px;letter-spacing:1.5px;flex-shrink:0;}
.ad-label-text{font-size:.78rem;color:rgba(255,255,255,.4);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 4 slot dots */
.ad-slot-dots{display:flex;gap:6px;align-items:center;margin-right:6px;}
.slot-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);
  background:transparent;transition:.3s;flex-shrink:0;}
.slot-dot.active{border-color:var(--gold);background:var(--gold);
  box-shadow:0 0 6px rgba(255,215,0,.5);}
.slot-dot.done{border-color:var(--green);background:var(--green);
  box-shadow:0 0 6px rgba(0,200,83,.4);}

/* Skip area */
.ad-skip-area{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#skip-lock-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:5px 13px;
  font-size:.76rem;font-weight:700;color:rgba(255,255,255,.4);}
#skip-lock-badge i{font-size:.68rem;color:var(--gold);}
#skip-ready-btn{
  display:none;align-items:center;gap:6px;
  padding:5px 15px;
  background:linear-gradient(135deg,rgba(229,9,20,.3),rgba(229,9,20,.5));
  border:1px solid rgba(229,9,20,.65);
  border-radius:6px;color:#fff;font-size:.76rem;font-weight:800;
  cursor:pointer;font-family:inherit;transition:.2s;}
#skip-ready-btn:hover{background:linear-gradient(135deg,rgba(229,9,20,.5),var(--accent));}

/* Ad progress bar */
.ad-prog-bar{height:3px;background:rgba(255,255,255,.06);flex-shrink:0;}
.ad-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#ff5a30);
  transition:width .25s linear;}

/* Ad video */
#ad-video-wrap{flex:1;position:relative;background:#000;overflow:hidden;}
#ad-video{width:100%;height:100%;object-fit:contain;display:block;}
.ad-corner{position:absolute;bottom:10px;left:10px;z-index:2;
  background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.1);
  border-radius:4px;padding:3px 10px;font-size:.62rem;
  color:rgba(255,255,255,.4);pointer-events:none;}

/* Loading spinner inside ad */
#ad-spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;z-index:3;display:none;}
#ad-spinner.active{display:block;}
.ad-spin{width:100%;height:100%;border-radius:50%;
  border:3px solid rgba(255,255,255,.06);border-top-color:var(--gold);
  animation:spin .8s linear infinite;}

/* ── ERROR ── */
#error-screen{display:none;position:absolute;inset:0;z-index:45;
  background:rgba(0,0,0,.97);align-items:center;justify-content:center;
  flex-direction:column;gap:14px;text-align:center;padding:40px;}
#error-screen.visible{display:flex;}
#error-screen i{font-size:2.5rem;color:var(--accent);}
#error-screen h3{font-size:1.2rem;}
#error-screen p{color:var(--muted);font-size:.88rem;max-width:320px;line-height:1.6;}
.err-retry{background:var(--accent);color:#fff;border:none;
  padding:10px 28px;border-radius:8px;font-size:.9rem;
  font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:.2s;}
.err-retry:hover{background:#ff2030;}

/* ── CONTROLS ── */
#ctrl-overlay{position:absolute;inset:0;z-index:10;
  background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,transparent 22%,transparent 58%,rgba(0,0,0,.92) 100%);
  display:flex;flex-direction:column;justify-content:space-between;
  opacity:0;transition:opacity .3s var(--ease);pointer-events:none;}
#ctrl-overlay.visible{opacity:1;pointer-events:all;}

.ctrl-top{display:flex;align-items:center;padding:14px 16px 0;gap:10px;}
.back-btn{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);color:#fff;
  border-radius:8px;padding:7px 14px;font-size:.85rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:.2s;font-family:inherit;}
.back-btn:hover{background:rgba(255,255,255,.15);}
.movie-title-bar{font-size:.95rem;font-weight:700;opacity:.9;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quality-badge{background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.4);
  color:var(--accent);padding:4px 10px;border-radius:4px;
  font-size:.68rem;font-weight:800;letter-spacing:1px;flex-shrink:0;}

.ctrl-center{display:flex;align-items:center;justify-content:center;gap:44px;flex:1;}
.ctrl-btn-lg{background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.22);
  color:#fff;border-radius:50%;width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;cursor:pointer;transition:all .2s var(--spring);position:relative;}
.ctrl-btn-lg:hover{transform:scale(1.1);border-color:#fff;}
.ctrl-btn-lg.play-pause{width:66px;height:66px;font-size:1.5rem;
  background:rgba(229,9,20,.85);border-color:var(--accent);}
.ctrl-btn-lg.play-pause:hover{background:var(--accent);}
.seek-sec-lbl{position:absolute;font-size:.46rem;bottom:8px;opacity:.65;pointer-events:none;}

.ctrl-bottom{padding:0 16px 12px;}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.time-display{font-size:.78rem;color:rgba(255,255,255,.82);font-weight:600;white-space:nowrap;}
.seek-wrap{flex:1;height:4px;background:rgba(255,255,255,.18);border-radius:4px;
  cursor:pointer;position:relative;transition:height .2s;overflow:visible;}
.seek-wrap:hover{height:6px;}
.seek-buf{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.22);border-radius:4px;}
.seek-fill{position:absolute;left:0;top:0;height:100%;background:var(--accent);border-radius:4px;}
.seek-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;background:#fff;border-radius:50%;
  box-shadow:0 0 6px rgba(0,0,0,.8);opacity:0;transition:opacity .2s;}
.seek-wrap:hover .seek-thumb{opacity:1;}
/* Ad markers */
.ad-mk{position:absolute;top:-4px;width:7px;height:12px;
  background:var(--gold);border-radius:2px;transform:translateX(-50%);
  pointer-events:none;box-shadow:0 0 4px rgba(255,215,0,.5);}
.ad-mk.played{background:var(--green);box-shadow:0 0 4px rgba(0,200,83,.5);}

.ctrl-icons{display:flex;align-items:center;gap:4px;}
.ctrl-icon{background:none;border:none;color:rgba(255,255,255,.82);
  font-size:1.05rem;cursor:pointer;padding:6px 8px;border-radius:6px;transition:all .15s;}
.ctrl-icon:hover{color:#fff;background:rgba(255,255,255,.1);}
.spacer{flex:1;}
.vol-wrap{display:flex;align-items:center;gap:8px;}
.vol-slider{-webkit-appearance:none;appearance:none;width:72px;height:4px;
  background:rgba(255,255,255,.2);border-radius:4px;outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#fff;border-radius:50%;}

/* ── TOAST ── */
#toast{position:absolute;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(16,16,16,.92);color:#fff;padding:8px 20px;border-radius:8px;
  font-size:.85rem;z-index:35;opacity:0;pointer-events:none;transition:all .3s var(--ease);
  border:1px solid rgba(255,255,255,.08);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── WATERMARK ── */
#watermark{position:absolute;z-index:22;pointer-events:none;font-size:.68rem;font-weight:700;
  color:rgba(255,255,255,.07);white-space:nowrap;transition:all 2.5s ease;}

/* ── DOUBLE TAP ── */
.dtap{position:absolute;top:50%;transform:translateY(-50%);
  width:88px;height:88px;border-radius:50%;
  background:rgba(255,255,255,.12);pointer-events:none;z-index:5;
  opacity:0;animation:ripple .45s ease forwards;}
.dtap.left{left:10%;} .dtap.right{right:10%;}
@keyframes ripple{0%{opacity:.5;transform:translateY(-50%) scale(.5);}100%{opacity:0;transform:translateY(-50%) scale(1.8);}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="ks-splash">
  <div class="spl-logo">KS <span>Movies</span></div>
  <div class="spl-tag">Preparing Your Movie…</div>
  <div class="spl-bar-wrap"><div class="spl-bar-fill" id="spl-bar"></div></div>
  <div class="spl-status" id="spl-status">Firebase se connect ho raha hai…</div>
</div>

<div id="player-shell">
<div id="video-area">

  <!-- Main movie -->
  <video id="main-video" playsinline preload="auto"></video>
  <div id="spinner"><div class="spin-ring"></div></div>
  <div id="watermark">KS MOVIES</div>

  <!-- ═══════════ INTRO OVERLAY ═══════════ -->
  <div id="intro-overlay">
    <video id="intro-video" playsinline preload="auto" src="ks_movie_intro.mp4"
      style="width:100%;height:100%;object-fit:contain;position:absolute;inset:0;"></video>
    <div class="intro-badge">
      <i class="fa-solid fa-clapperboard"></i>
      KS Movies Intro
      <span id="intro-cd"></span>
    </div>
  </div>

  <!-- ═══════════ AD OVERLAY ═══════════════ -->
  <div id="ad-overlay">
    <!-- Top bar -->
    <div class="ad-topbar">
      <div class="ad-tag">AD</div>
      <div class="ad-label-text" id="ad-label-text">Advertisement</div>
      <!-- 4 slot dots -->
      <div class="ad-slot-dots">
        <div class="slot-dot" id="sdot-0" title="Ad Slot 1"></div>
        <div class="slot-dot" id="sdot-1" title="Ad Slot 2"></div>
        <div class="slot-dot" id="sdot-2" title="Ad Slot 3"></div>
        <div class="slot-dot" id="sdot-3" title="Ad Slot 4"></div>
      </div>
      <!-- Skip control -->
      <div class="ad-skip-area">
        <div id="skip-lock-badge">
          <i class="fa-solid fa-lock"></i>
          <span id="skip-sec-txt">30</span>s mein skip
        </div>
        <button id="skip-ready-btn" onclick="doSkipAd()">
          Skip <i class="fa-solid fa-forward-step"></i>
        </button>
      </div>
    </div>
    <!-- Progress -->
    <div class="ad-prog-bar"><div class="ad-prog-fill" id="ad-prog-fill" style="width:0%"></div></div>
    <!-- Ad video -->
    <div id="ad-video-wrap">
      <video id="ad-video" playsinline preload="auto"
        style="width:100%;height:100%;object-fit:contain;display:block;"></video>
      <div id="ad-spinner"><div class="ad-spin"></div></div>
      <div class="ad-corner">KS Movies — Advertisement</div>
    </div>
  </div>

  <!-- ═══════════ ERROR ════════════════════ -->
  <div id="error-screen">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <h3 id="err-title">Video Load Nahi Hua</h3>
    <p id="err-msg">Dobara try karo.</p>
    <button class="err-retry" onclick="retryPlayback()">
      <i class="fa-solid fa-rotate-right"></i> Retry
    </button>
  </div>

  <!-- ═══════════ CONTROLS ════════════════ -->
  <div id="ctrl-overlay">
    <div class="ctrl-top">
      <button class="back-btn" onclick="goBack()">
        <i class="fa-solid fa-chevron-left"></i> Back
      </button>
      <div class="movie-title-bar" id="movie-title">Loading…</div>
      <div class="quality-badge" id="quality-badge">—</div>
    </div>
    <div class="ctrl-center">
      <button class="ctrl-btn-lg" onclick="seekVideo(-10)">
        <i class="fa-solid fa-rotate-left"></i><span class="seek-sec-lbl">10s</span>
      </button>
      <button class="ctrl-btn-lg play-pause" onclick="togglePlay()">
        <i class="fa-solid fa-play" id="play-icon"></i>
      </button>
      <button class="ctrl-btn-lg" onclick="seekVideo(10)">
        <i class="fa-solid fa-rotate-right"></i><span class="seek-sec-lbl">10s</span>
      </button>
    </div>
    <div class="ctrl-bottom">
      <div class="progress-row">
        <span class="time-display" id="time-cur">0:00</span>
        <div class="seek-wrap" id="seek-wrap">
          <div class="seek-buf" id="seek-buf"></div>
          <div class="seek-fill" id="seek-fill"></div>
          <div class="seek-thumb" id="seek-thumb"></div>
        </div>
        <span class="time-display" id="time-dur">0:00</span>
      </div>
      <div class="ctrl-icons">
        <div class="vol-wrap">
          <button class="ctrl-icon" onclick="toggleMute()">
            <i class="fa-solid fa-volume-high" id="vol-icon"></i>
          </button>
          <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="100">
        </div>
        <div class="spacer"></div>
        <button class="ctrl-icon" onclick="togglePip()"><i class="fa-solid fa-clone"></i></button>
        <button class="ctrl-icon" onclick="toggleFullscreen()">
          <i class="fa-solid fa-expand" id="fs-icon"></i>
        </button>
      </div>
    </div>
  </div>

</div><!-- /video-area -->
</div><!-- /player-shell -->

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
//   FIREBASE CONFIG
// ════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBNyfzP26mSnB0qsm24zIeTM2K9sVBV1zc",
  authDomain:        "ks-movies-98e3e.firebaseapp.com",
  databaseURL:       "https://ks-movies-98e3e-default-rtdb.firebaseio.com",
  projectId:         "ks-movies-98e3e",
  storageBucket:     "ks-movies-98e3e.firebasestorage.app",
  messagingSenderId: "392323800373",
  appId:             "1:392323800373:web:b289cf81f4c0232d66007c"
};

// ════════════════════════════════════════════════════════
//   CONSTANTS & STATE
// ════════════════════════════════════════════════════════
const SKIP_LOCK = 30; // seconds before skip is allowed

// AD TRIGGER % points  → which slot to use
// triggers: [0%→slot0, 25%→slot1, 50%→slot2, 75%→slot3, 100%→slot0]
const AD_MAP = [
  { pct: 0,   slot: 0, label: 'Movie Se Pehle'      },
  { pct: 25,  slot: 1, label: '25% Par'             },
  { pct: 50,  slot: 2, label: '50% Par (Interval)'  },
  { pct: 75,  slot: 3, label: '75% Par'             },
  { pct: 100, slot: 0, label: 'Movie Khatam'        },
];

let DB, AUTH;
let movieData   = null;
let hlsInst     = null;
let isPlaying   = false;
let isMuted     = false;
let isSeeking   = false;
let ctrlTimeout;
let wmTimer;

// Ad state
let adSlots     = ['','','',''];  // 4 video URLs from Firebase
let adFired     = [false,false,false,false,false]; // one per trigger
let adSkipSec   = 0;
let adSkipTmr   = null;
let adDoneCallback = null;
let activeTriggerIdx = -1;

// DOM shortcuts
const videoEl    = document.getElementById('main-video');
const adVideoEl  = document.getElementById('ad-video');
const introVid   = document.getElementById('intro-video');
const overlay    = document.getElementById('ctrl-overlay');
const playIcon   = document.getElementById('play-icon');
const seekFill   = document.getElementById('seek-fill');
const seekBuf    = document.getElementById('seek-buf');
const seekThumb  = document.getElementById('seek-thumb');
const seekWrap   = document.getElementById('seek-wrap');
const timeCur    = document.getElementById('time-cur');
const timeDur    = document.getElementById('time-dur');
const volSlider  = document.getElementById('vol-slider');
const errScr     = document.getElementById('error-screen');
const spinner    = document.getElementById('spinner');
const adOvl      = document.getElementById('ad-overlay');
const adProgFill = document.getElementById('ad-prog-fill');
const skipLockBadge = document.getElementById('skip-lock-badge');
const skipReadyBtn  = document.getElementById('skip-ready-btn');
const skipSecTxt    = document.getElementById('skip-sec-txt');
const adSpinner     = document.getElementById('ad-spinner');
const introOvl      = document.getElementById('intro-overlay');

// ════════════════════════════════════════════════════════
//   SPLASH BAR
// ════════════════════════════════════════════════════════
let splPct = 0;
const splBar    = document.getElementById('spl-bar');
const splStatus = document.getElementById('spl-status');
const splT = setInterval(() => {
  splPct = splPct < 80 ? splPct + Math.random()*5 : splPct + .3;
  if (splPct >= 100) { splPct = 100; clearInterval(splT); }
  splBar.style.width = splPct + '%';
}, 80);
function hideSplash() {
  clearInterval(splT); splBar.style.width = '100%';
  setTimeout(() => {
    const s = document.getElementById('ks-splash');
    s.classList.add('hide');
    setTimeout(() => s.style.display = 'none', 700);
  }, 350);
}

// ════════════════════════════════════════════════════════
//   FIREBASE INIT
// ════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  firebase.initializeApp(firebaseConfig);
  DB = firebase.database(); AUTH = firebase.auth();

  const p = new URLSearchParams(window.location.search);
  const movieId   = p.get('id');
  const directUrl = p.get('url');

  if (directUrl) {
    hideSplash();
    beginWithIntro(decodeURIComponent(directUrl), 'Movie', ['','','','']);
    return;
  }
  if (!movieId) {
    hideSplash();
    showError('Movie ID Nahi Mila', 'URL mein ?id=MOVIE_ID hona chahiye.');
    return;
  }

  splStatus.textContent = 'Movie data fetch ho rahi hai…';
  DB.ref(`movies/${movieId}`).on('value', snap => {
    const d = snap.val();
    if (!d) { hideSplash(); showError('Movie Nahi Mili', `ID "${movieId}" nahi mila.`); return; }

    movieData = d;
    const title = d.title   || 'KS Movies';
    const url   = d.playUrl || d.streamUrl || d.url || '';
    const ads   = Array.isArray(d.ads) ? d.ads : [];

    document.getElementById('movie-title').textContent = title;
    document.getElementById('quality-badge').textContent = detectQuality(url);
    document.title = title + ' — KS Movies';

    // Store 4 ad slots
    adSlots = [ads[0]||'', ads[1]||'', ads[2]||'', ads[3]||''];
    hideSplash();

    if (!url) { showError('Play URL Nahi Hai', 'Admin panel mein Play URL set karo.'); return; }
    if (!videoEl.getAttribute('data-loaded')) {
      videoEl.setAttribute('data-loaded', '1');
      beginWithIntro(url, title, adSlots);
    }
  });
});

// ════════════════════════════════════════════════════════
//   STEP 1 — INTRO VIDEO  →  AD(0%)  →  MOVIE
// ════════════════════════════════════════════════════════
function beginWithIntro(movieUrl, title, ads) {
  introOvl.classList.remove('hidden');
  introVid.currentTime = 0;
  introVid.play().catch(() => {});

  // Countdown display
  const cdEl = document.getElementById('intro-cd');
  let cdVal  = 0;
  introVid.addEventListener('loadedmetadata', () => {
    cdVal = Math.ceil(introVid.duration);
    cdEl.textContent = cdVal + 's';
  }, { once: true });

  const cdTmr = setInterval(() => {
    cdVal = Math.max(0, cdVal - 1);
    cdEl.textContent = cdVal > 0 ? cdVal + 's' : '';
  }, 1000);

  function afterIntro() {
    clearInterval(cdTmr);
    introOvl.classList.add('hidden');
    // Fire 0% ad (slot 0)
    playAd(0, () => loadMovie(movieUrl));
  }

  introVid.addEventListener('ended', afterIntro, { once: true });
  introVid.addEventListener('error', afterIntro, { once: true });
}

// ════════════════════════════════════════════════════════
//   STEP 2 — LOAD MAIN MOVIE
// ════════════════════════════════════════════════════════
function loadMovie(url) {
  errScr.classList.remove('visible');
  showSpinner();
  destroyHLS();

  const isHLS = url.includes('.m3u8');
  if (isHLS && Hls.isSupported()) {
    hlsInst = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 30 });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(videoEl);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
    hlsInst.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) showError('Stream Error', 'HLS load nahi hua.'); });
  } else if (isHLS && videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = url; videoEl.play().catch(() => {});
  } else {
    videoEl.src = url; videoEl.load(); videoEl.play().catch(() => {});
  }

  adFired[0] = true; // 0% already handled before movie
  placeAdMarkers();
}

// ════════════════════════════════════════════════════════
//   AD ENGINE
// ════════════════════════════════════════════════════════
function playAd(triggerIdx, onDone) {
  const entry  = AD_MAP[triggerIdx];
  const adUrl  = adSlots[entry.slot] || '';

  if (!adUrl) { onDone(); return; } // no URL → skip

  activeTriggerIdx = triggerIdx;
  adDoneCallback   = onDone;
  adSkipSec        = 0;

  // UI reset
  adProgFill.style.width       = '0%';
  skipSecTxt.textContent       = SKIP_LOCK;
  skipLockBadge.style.display  = 'flex';
  skipReadyBtn.style.display   = 'none';
  document.getElementById('ad-label-text').textContent =
    `Ad ${triggerIdx + 1} of 5 — ${entry.label}`;

  // Highlight correct dot
  highlightDot(entry.slot, 'active');

  // Show overlay
  adOvl.classList.add('visible');
  adSpinner.classList.add('active');

  // Load ad video
  adVideoEl.src = adUrl;
  adVideoEl.currentTime = 0;
  adVideoEl.load();
  adVideoEl.play().catch(() => {});

  adVideoEl.addEventListener('canplay', () => adSpinner.classList.remove('active'), { once: true });
  adVideoEl.addEventListener('error',   () => finishAd(), { once: true });
  adVideoEl.addEventListener('ended',   () => finishAd(), { once: true });

  // 30-second non-skip countdown
  clearInterval(adSkipTmr);
  adSkipTmr = setInterval(() => {
    adSkipSec++;

    // Update skip countdown
    const rem = Math.max(0, SKIP_LOCK - adSkipSec);
    skipSecTxt.textContent = rem;

    // Progress bar based on ad video duration or 60s fallback
    const adDur = (adVideoEl.duration && isFinite(adVideoEl.duration))
      ? adVideoEl.duration : 60;
    adProgFill.style.width = Math.min(100, (adSkipSec / adDur) * 100) + '%';

    // Unlock skip after 30s
    if (adSkipSec >= SKIP_LOCK) {
      skipLockBadge.style.display = 'none';
      skipReadyBtn.style.display  = 'flex';
    }
  }, 1000);
}

function finishAd() {
  clearInterval(adSkipTmr);
  adOvl.classList.remove('visible');
  adSpinner.classList.remove('active');
  adVideoEl.src = '';
  adProgFill.style.width = '0%';

  // Mark dot done
  const entry = AD_MAP[activeTriggerIdx];
  highlightDot(entry.slot, 'done');

  // Mark ad-marker on seekbar as played
  const pct = entry.pct;
  if (pct > 0 && pct < 100) {
    seekWrap.querySelectorAll('.ad-mk').forEach(m => {
      if (parseInt(m.dataset.p) === pct) m.classList.add('played');
    });
  }

  adFired[activeTriggerIdx] = true;
  const cb = adDoneCallback;
  adDoneCallback   = null;
  activeTriggerIdx = -1;
  if (cb) cb();
}

function doSkipAd() {
  if (adSkipSec < SKIP_LOCK) return;
  adVideoEl.pause();
  // Resume movie if mid-movie ad
  const wasMidMovie = [1, 2, 3].includes(activeTriggerIdx);
  finishAd();
  if (wasMidMovie) videoEl.play().catch(() => {});
}

// Dot state helper
function highlightDot(slotIdx, state) {
  const d = document.getElementById('sdot-' + slotIdx);
  if (!d) return;
  d.className = 'slot-dot ' + state;
}

// Gold markers on seekbar at 25%, 50%, 75%
function placeAdMarkers() {
  seekWrap.querySelectorAll('.ad-mk').forEach(m => m.remove());
  [25, 50, 75].forEach(pct => {
    const m = document.createElement('div');
    m.className = 'ad-mk';
    m.style.left = pct + '%';
    m.dataset.p  = pct;
    seekWrap.appendChild(m);
  });
}

// Check triggers during playback
function checkAdTriggers() {
  const dur = videoEl.duration;
  if (!dur || isNaN(dur)) return;
  const pct = (videoEl.currentTime / dur) * 100;

  for (let i = 1; i <= 3; i++) {     // triggers 1,2,3 → 25%,50%,75%
    if (!adFired[i] && pct >= AD_MAP[i].pct) {
      adFired[i] = true;
      videoEl.pause();
      playAd(i, () => videoEl.play().catch(() => {}));
      return;
    }
  }
}

// 100% / ended
function checkEndAd() {
  if (!adFired[4]) {
    adFired[4] = true;
    playAd(4, () => {});
  }
}

// ════════════════════════════════════════════════════════
//   VIDEO EVENTS
// ════════════════════════════════════════════════════════
videoEl.addEventListener('playing',        () => { isPlaying = true;  updatePlayIcon(); hideSpinner(); });
videoEl.addEventListener('pause',          () => { isPlaying = false; updatePlayIcon(); });
videoEl.addEventListener('waiting',        showSpinner);
videoEl.addEventListener('canplay',        hideSpinner);
videoEl.addEventListener('loadedmetadata', () => { timeDur.textContent = formatTime(videoEl.duration); placeAdMarkers(); });
videoEl.addEventListener('timeupdate',     () => { updateProgress(); checkAdTriggers(); });
videoEl.addEventListener('progress',       updateBuffer);
videoEl.addEventListener('ended',          checkEndAd);
videoEl.addEventListener('error',          () => {
  hideSpinner();
  const c = videoEl.error ? videoEl.error.code : 0;
  const m = {2:'Network error.',3:'Decode error.',4:'Source invalid / expired.'};
  showError('Video Error', m[c]||'Unknown error. Retry karo.');
});

// ════════════════════════════════════════════════════════
//   PLAYBACK CONTROLS
// ════════════════════════════════════════════════════════
function togglePlay() {
  if (videoEl.paused) videoEl.play().catch(() => showToast('Autoplay blocked'));
  else videoEl.pause();
}
function updatePlayIcon() {
  playIcon.className = isPlaying ? 'fa-solid fa-pause' : 'fa-solid fa-play';
}
function seekVideo(sec) {
  const t = Math.max(0, Math.min(videoEl.duration||0, videoEl.currentTime+sec));
  videoEl.currentTime = t;
  showToast(sec > 0 ? `⏩ +${sec}s` : `⏪ ${sec}s`);
}
function updateProgress() {
  const d = videoEl.duration||0, c = videoEl.currentTime||0;
  const p = d ? (c/d*100) : 0;
  seekFill.style.width = p + '%';
  seekThumb.style.left  = p + '%';
  timeCur.textContent   = formatTime(c);
}
function updateBuffer() {
  if (!videoEl.buffered.length) return;
  const d = videoEl.duration||0;
  seekBuf.style.width = (d ? videoEl.buffered.end(videoEl.buffered.length-1)/d*100 : 0)+'%';
}

// Seekbar drag
function getSeekPct(e) { const r=seekWrap.getBoundingClientRect(); return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); }
function doSeek(p)     { if (isFinite(videoEl.duration)) videoEl.currentTime = p * videoEl.duration; }
seekWrap.addEventListener('mousedown', e => { isSeeking=true; doSeek(getSeekPct(e)); });
document.addEventListener('mousemove', e => { if (isSeeking) doSeek(getSeekPct(e)); });
document.addEventListener('mouseup',   () => { isSeeking=false; });
seekWrap.addEventListener('touchstart', e => { isSeeking=true; doSeek(getSeekPct(e.touches[0])); },{passive:true});
document.addEventListener('touchmove',  e => { if (isSeeking) doSeek(getSeekPct(e.touches[0])); },{passive:true});
document.addEventListener('touchend',   () => { isSeeking=false; });

// Volume
volSlider.addEventListener('input', () => {
  const v=volSlider.value/100; isMuted=(v===0);
  videoEl.volume=v; videoEl.muted=isMuted;
  document.getElementById('vol-icon').className =
    isMuted?'fa-solid fa-volume-xmark':v<.5?'fa-solid fa-volume-low':'fa-solid fa-volume-high';
});
function toggleMute() {
  isMuted=!isMuted; videoEl.muted=isMuted;
  const icon=document.getElementById('vol-icon');
  if (isMuted) { icon.className='fa-solid fa-volume-xmark'; volSlider.value=0; }
  else         { videoEl.volume=1; icon.className='fa-solid fa-volume-high'; volSlider.value=100; }
}

// Controls visibility
function showControls() {
  overlay.classList.add('visible');
  clearTimeout(ctrlTimeout);
  ctrlTimeout=setTimeout(()=>overlay.classList.remove('visible'),3500);
}
document.getElementById('video-area').addEventListener('mousemove', showControls);
document.getElementById('video-area').addEventListener('touchstart', showControls, {passive:true});
document.getElementById('video-area').addEventListener('click', e => {
  if (e.target===videoEl||['ctrl-overlay','video-area'].includes(e.target.id)) togglePlay();
});

// Double tap
let lastTap=0;
document.getElementById('video-area').addEventListener('touchend', e => {
  const now=Date.now();
  if (now-lastTap<300) {
    const x=e.changedTouches[0].clientX;
    if (x<window.innerWidth/2) { seekVideo(-10); addRipple('left'); }
    else                        { seekVideo(10);  addRipple('right'); }
  } else { lastTap=now; }
});
function addRipple(side) {
  const r=document.createElement('div'); r.className='dtap '+side;
  document.getElementById('video-area').appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
}

// Keyboard
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  switch(e.key) {
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': seekVideo(10); break;
    case 'ArrowLeft':  seekVideo(-10); break;
    case 'f': toggleFullscreen(); break;
    case 'm': toggleMute(); break;
  }
});

// Fullscreen
function toggleFullscreen() {
  try {
    if (!document.fullscreenElement&&!document.webkitFullscreenElement) {
      (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen).call(document.documentElement);
      document.getElementById('fs-icon').className='fa-solid fa-compress';
    } else {
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
      document.getElementById('fs-icon').className='fa-solid fa-expand';
    }
  } catch(e){}
}
async function togglePip() {
  try {
    if (document.pictureInPictureElement) await document.exitPictureInPicture();
    else if (videoEl.requestPictureInPicture) await videoEl.requestPictureInPicture();
  } catch(e) { showToast('PiP supported nahi'); }
}

// Watermark
const wm=document.getElementById('watermark');
function moveWm() { wm.style.left=(Math.random()*80)+'%'; wm.style.top=(Math.random()*80)+'%'; }
moveWm(); wmTimer=setInterval(moveWm,5000);

// ════════════════════════════════════════════════════════
//   UTILS
// ════════════════════════════════════════════════════════
function detectQuality(url) {
  if (!url) return '—';
  if (url.includes('4k')||url.includes('2160')) return '4K';
  if (url.includes('1080')) return '1080p';
  if (url.includes('720'))  return '720p';
  if (url.includes('480'))  return '480p';
  if (url.includes('.m3u8')) return 'LIVE';
  return 'HD';
}
function destroyHLS() { if (hlsInst) { try{hlsInst.destroy();}catch(e){} hlsInst=null; } }
function retryPlayback() {
  errScr.classList.remove('visible');
  if (movieData) {
    const url=movieData.playUrl||movieData.streamUrl||'';
    if (url) loadMovie(url);
  }
}
function showSpinner() { spinner.classList.add('active'); }
function hideSpinner() { spinner.classList.remove('active'); }
function showError(t,m) {
  document.getElementById('err-title').textContent=t;
  document.getElementById('err-msg').textContent=m;
  errScr.classList.add('visible'); hideSpinner();
}
function showToast(msg,dur=2500) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function formatTime(s) {
  if (!s||isNaN(s)||!isFinite(s)) return '0:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
}
function goBack() {
  destroyHLS(); clearInterval(wmTimer); clearInterval(adSkipTmr);
  window.history.length>1?window.history.back():(window.location.href='user.html');
}

showControls();
</script>
