<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/ks-pwa.js"></script>
    <script src="/ks-tv.js"></script>
    <script src="ks-protect.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>KS Movies — Choose Your Languages</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --red: #e50914; --red2: #ff1e2d;
            --bg: #0a0a0a; --text: #fff; --text2: #b3b3b3;
            --border: rgba(255,255,255,0.1);
            --spring: cubic-bezier(.34,1.56,.64,1);
            --ease: cubic-bezier(.4,0,.2,1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(229,9,20,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(229,9,20,0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(10,10,10,0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.6rem; letter-spacing: 2px;
        }
        .logo .ks { color: var(--red); }

        /* MAIN */
        main {
            position: relative; z-index: 1;
            padding: 80px 5% 120px;
            max-width: 700px; margin: 0 auto;
            text-align: center;
        }

        /* Speaker icon */
        .speaker-wrap {
            width: 52px; height: 52px;
            background: rgba(229,9,20,0.12);
            border: 1.5px solid rgba(229,9,20,0.3);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.3rem; color: var(--red);
            animation: pulseRed 2s ease infinite;
        }
        @keyframes pulseRed {
            0%,100% { box-shadow: 0 0 0 0 rgba(229,9,20,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(229,9,20,0); }
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 800; margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text2); font-size: 1rem;
            margin-bottom: 36px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .subtitle i { color: var(--red); }

        /* LANGUAGE GRID */
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }
        @media(min-width: 480px) { .lang-grid { grid-template-columns: repeat(2, 1fr); } }

        .lang-card {
            position: relative;
            height: 100px;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s var(--ease);
            background: #111;
        }
        .lang-card:active { transform: scale(0.97); }
        .lang-card.selected {
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(229,9,20,0.35);
        }
        .lang-card img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.55);
            transition: filter 0.25s;
        }
        .lang-card.selected img { filter: brightness(0.4); }
        .lang-card:hover img { filter: brightness(0.65); }

        .lang-info {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: flex-end;
            padding: 12px 14px;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 60%);
        }
        .lang-native {
            font-size: 1.2rem; font-weight: 900;
            color: #fff; line-height: 1.1;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        .lang-english {
            font-size: 0.72rem; font-weight: 600;
            color: rgba(255,255,255,0.65); margin-top: 2px;
        }

        /* Check mark on selected */
        .lang-check {
            position: absolute; top: 10px; right: 10px;
            width: 24px; height: 24px;
            background: var(--red);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; color: #fff;
            opacity: 0; transform: scale(0);
            transition: all 0.2s var(--spring);
        }
        .lang-card.selected .lang-check {
            opacity: 1; transform: scale(1);
        }

        /* SKIP / CONTINUE */
        .actions {
            display: flex; gap: 12px;
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 5% 28px;
            background: linear-gradient(0deg, rgba(10,10,10,0.98) 70%, transparent 100%);
            z-index: 100;
        }
        .btn-skip {
            padding: 14px 22px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 10px; color: var(--text2);
            font-size: 0.9rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-skip:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .btn-continue {
            flex: 1;
            padding: 14px;
            background: var(--red);
            border: none; border-radius: 10px;
            color: #fff; font-size: 1rem; font-weight: 800;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(229,9,20,0.4);
        }
        .btn-continue:hover { background: var(--red2); transform: scale(1.02); }
        .btn-continue:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        /* Selected count */
        .selected-count {
            font-size: 0.78rem; color: var(--text2);
            margin-bottom: 8px;
            min-height: 20px;
            transition: all 0.2s;
        }
        .selected-count.has-selection { color: var(--red); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span class="ks">KS</span> MOVIES</div>
</header>

<main>
    <div class="speaker-wrap">
        <i class="fa-solid fa-volume-high"></i>
    </div>
    <h1>Build Your Home Page</h1>
    <p class="subtitle">
        <i class="fa-solid fa-volume-high"></i>
        Choose your favourite languages
    </p>

    <p class="selected-count" id="sel-count"></p>

    <div class="lang-grid" id="lang-grid">
        <!-- Injected by JS -->
    </div>
</main>

<div class="actions">
    <button class="btn-skip" onclick="skipOnboarding()">Skip</button>
    <button class="btn-continue" id="btn-continue" onclick="saveAndContinue()">
        <span id="continue-text">Start Watching</span>
        <i class="fa-solid fa-arrow-right"></i>
    </button>
</div>

<script>
// Firebase
const firebaseConfig = {
    apiKey:"AIzaSyBNyfzP26mSnB0qsm24zIeTM2K9sVBV1zc",
    authDomain:"ks-movies-98e3e.firebaseapp.com",
    databaseURL:"https://ks-movies-98e3e-default-rtdb.firebaseio.com",
    projectId:"ks-movies-98e3e",
    storageBucket:"ks-movies-98e3e.firebasestorage.app",
    messagingSenderId:"392323800373",
    appId:"1:392323800373:web:b289cf81f4c0232d66007c"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const LANGUAGES = [
    { id:'hindi',     native:'हिन्दी',    english:'Hindi',     img:'https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg' },
    { id:'english',   native:'English',   english:'English',   img:'https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg' },
    { id:'tamil',     native:'தமிழ்',     english:'Tamil',     img:'https://image.tmdb.org/t/p/w500/rktDFPbfHfUbArZ6OOOKsXcv0Bm.jpg' },
    { id:'telugu',    native:'తెలుగు',    english:'Telugu',    img:'https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggkl.jpg' },
    { id:'malayalam', native:'മലയാളം',   english:'Malayalam', img:'https://image.tmdb.org/t/p/w500/sv1xJUazXeYqALzczSZ3O6nkH75.jpg' },
    { id:'bengali',   native:'বাংলা',     english:'Bengali',   img:'https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg' },
    { id:'marathi',   native:'मराठी',     english:'Marathi',   img:'https://image.tmdb.org/t/p/w500/62HCnUTHJl7jVFAOAzgBZbXZRoR.jpg' },
    { id:'kannada',   native:'ಕನ್ನಡ',    english:'Kannada',   img:'https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg' },
];

let selected = new Set();

function renderGrid() {
    const grid = document.getElementById('lang-grid');
    grid.innerHTML = LANGUAGES.map(l => `
        <div class="lang-card ${selected.has(l.id) ? 'selected' : ''}" 
             id="lc-${l.id}" onclick="toggleLang('${l.id}')">
            <img src="${l.img}" alt="${l.english}" 
                 onerror="this.style.display='none'">
            <div class="lang-info">
                <div class="lang-native">${l.native}</div>
                <div class="lang-english">${l.english}</div>
            </div>
            <div class="lang-check"><i class="fa-solid fa-check"></i></div>
        </div>
    `).join('');
}

function toggleLang(id) {
    const card = document.getElementById('lc-' + id);
    if (selected.has(id)) {
        selected.delete(id);
        card.classList.remove('selected');
    } else {
        selected.add(id);
        card.classList.add('selected');
    }
    updateCount();
}

function updateCount() {
    const el = document.getElementById('sel-count');
    const btn = document.getElementById('continue-text');
    if (selected.size === 0) {
        el.textContent = '';
        el.className = 'selected-count';
        btn.textContent = 'Start Watching';
    } else {
        el.textContent = `${selected.size} language${selected.size > 1 ? 's' : ''} selected`;
        el.className = 'selected-count has-selection';
        btn.textContent = 'Start Watching';
    }
}

async function saveAndContinue() {
    const langs = Array.from(selected);
    // Save to Firebase if logged in
    const user = auth.currentUser;
    if (user && langs.length > 0) {
        try {
            await db.ref(`users/${user.uid}/preferredLanguages`).set(langs);
        } catch(_) {}
    }
    // Mark onboarding done
    localStorage.setItem('ks_onboarding_done', '1');
    window.location.href = 'user.html';
}

function skipOnboarding() {
    localStorage.setItem('ks_onboarding_done', '1');
    window.location.href = 'user.html';
}

// If already done onboarding, skip
if (localStorage.getItem('ks_onboarding_done')) {
    window.location.href = 'user.html';
}

renderGrid();
</script>
</body>
</html>
